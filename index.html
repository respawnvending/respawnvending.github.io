<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESPAWN VENDING</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="contact-section" id="contact">
  <div>
    <h2>Want a RESPAWN machine at your location?</h2>
    <p>
      If you manage a family, youth, entertainment, or high-traffic location in Minnesota, reach out for placement information.
    </p>
  </div>

  <form class="contact-form" action="https://formsubmit.co/respawnvending@gmail.com" method="POST">

    <input type="hidden" name="_subject" value="New RESPAWN VENDING Inquiry">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">

    <input type="text" name="name" placeholder="Name" required />
    <input type="text" name="business" placeholder="Business / Location Name" required />
    <input type="email" name="email" placeholder="Email" required />

    <textarea name="message" placeholder="Tell us about your location" required></textarea>

    <button type="submit">Send Inquiry</button>

    <p class="form-note">
      Inquiries are sent directly to respawnvending@gmail.com.
    </p>
  </form>
</section>

</body>
</html>
